version: '3.8'

services:
  # 1. Sipariş Servisi için PostgreSQL (Kalıcı Veri)
  postgres_order:
    image: postgres:15-alpine
    container_name: logistics_postgres_order
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: OrderDb
    ports:
      - "5432:5432"
    volumes:
      - postgres_order_data:/var/lib/postgresql/data
    restart: always

  # 2. Kurye Takip Servisi için Redis (Anlık / Uçucu Veri)
  redis_tracking:
    image: redis:7-alpine
    container_name: logistics_redis_tracking
    ports:
      - "6379:6379"
    volumes:
      - redis_tracking_data:/data
    restart: always

  # 3. Servisler arası iletişim için Message Broker (RabbitMQ)
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: logistics_rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"   # Mikroservislerin mesaj göndermek/almak için kullanacağı port
      - "15672:15672" # Senin tarayıcıdan girip kuyrukları izleyeceğin görsel arayüz portu
    restart: always

volumes:
  postgres_order_data:
  redis_tracking_data: